<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>SVG Folder Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      background: #0f172a;
      color: white;
    }

    /* 左侧文件列表 */
    #sidebar {
      width: 260px;
      background: #111827;
      padding: 12px;
      overflow-y: auto;
      border-right: 1px solid #1f2937;
    }

    #fileInput {
      width: 100%;
      margin-bottom: 12px;
      color: white;
    }

    .file-item {
      padding: 8px;
      margin: 4px 0;
      background: #1f2937;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      word-break: break-all;
    }

    .file-item:hover {
      background: #334155;
    }

    /* 右侧预览区 */
    #preview {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .hint {
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <input id="fileInput" type="file" webkitdirectory multiple />
  <div id="list"></div>
</div>

<div id="preview">
  <div class="hint">请选择 SVG 文件</div>
</div>

<script>
  const fileInput = document.getElementById("fileInput");
  const list = document.getElementById("list");
  const preview = document.getElementById("preview");

  let filesMap = new Map();

  fileInput.addEventListener("change", (e) => {
    list.innerHTML = "";
    filesMap.clear();

    const files = Array.from(e.target.files)
      .filter(f => f.name.endsWith(".svg"));

    if (files.length === 0) {
      list.innerHTML = "<div>没有 SVG 文件</div>";
      return;
    }

    files.forEach(file => {
      filesMap.set(file.name, file);

      const div = document.createElement("div");
      div.className = "file-item";
      div.textContent = file.webkitRelativePath || file.name;

      div.onclick = () => openSVG(file);

      list.appendChild(div);
    });
  });

  function openSVG(file) {
    const reader = new FileReader();

    reader.onload = () => {
      preview.innerHTML = "";

      const iframe = document.createElement("iframe");
      iframe.srcdoc = reader.result;

      preview.appendChild(iframe);
    };

    reader.readAsText(file);
  }
</script>

</body>
</html>
